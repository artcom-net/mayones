name: dev-ci
run-name: ${{ github.actor }} is building Mayones
on: push

jobs:

  build:
    name: Build
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup LLVM tools
        run: |
            pip install clang-tidy==22.1.0.1 clang-format==22.1.3
            clang-tidy --version
            clang-format --version

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "^4.2.3"
          ninjaVersion: "^1.13.2"

      - name: Configure build
        uses: lukka/run-cmake@v10
        with:
          configurePreset: 'msvc-debug'
          configurePresetAdditionalArgs: "['-DBUILD_TESTING=ON']"

      - name: Pre-commit
        uses: pre-commit/action@v3.0.1
        # env:
        #   SKIP: clang-tidy
        with:
          extra_args: --all-files

      - name: Build
        uses: lukka/run-cmake@v10
        with:
          buildPreset: 'msvc-debug'

      # - name: clang-tidy
      #   uses: pre-commit/action@v3.0.1
      #   with:
      #     extra_args: --all-files clang-tidy

      - name: Test
        uses: lukka/run-cmake@v10
        with:
          testPreset: 'msvc-debug'
